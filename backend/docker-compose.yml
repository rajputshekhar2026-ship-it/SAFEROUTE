version: '3.8'

# ============================================
# SAFE-ROUTE BACKEND - DOCKER COMPOSE CONFIGURATION
# ============================================
# Complete development and production environment
# Services: PostgreSQL (PostGIS), Redis, Node.js App, Nginx, Prometheus, Grafana

services:
  # ============================================
  # POSTGRESQL WITH POSTGIS
  # ============================================
  postgres:
    image: postgis/postgis:14-3.4
    container_name: saferoute-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-saferoute}
      POSTGRES_USER: ${DB_USER:-saferoute_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./src/scripts/initDb.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - saferoute-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-saferoute_user} -d ${DB_NAME:-saferoute}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # POSTGRES REPLICA (for read operations)
  # ============================================
  postgres_replica:
    image: postgis/postgis:14-3.4
    container_name: saferoute-postgres-replica
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-saferoute}
      POSTGRES_USER: ${DB_USER:-saferoute_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    ports:
      - "${DB_REPLICA_PORT:-5433}:5432"
    networks:
      - saferoute-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # REDIS CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: saferoute-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - saferoute-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # REDIS INSIGHT (Redis GUI)
  # ============================================
  redis-insight:
    image: redis/redisinsight:latest
    container_name: saferoute-redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/db
    networks:
      - saferoute-network
    depends_on:
      - redis

  # ============================================
  # NODE.JS BACKEND APPLICATION
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${NODE_ENV:-production}
    container_name: saferoute-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-saferoute_user}:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/${DB_NAME:-saferoute}?sslmode=disable
      DATABASE_REPLICA_URL: postgresql://${DB_USER:-saferoute_user}:${DB_PASSWORD:-secure_password_change_me}@postgres_replica:5432/${DB_NAME:-saferoute}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
      CRIME_MODEL_API_URL: http://ml-service:5000/predict
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./models:/app/models
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - saferoute-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # NGINX REVERSE PROXY (Load Balancer)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: saferoute-nginx
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - saferoute-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============================================
  # ML SERVICE (Crime Prediction)
  # ============================================
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile.ml
    container_name: saferoute-ml
    restart: unless-stopped
    environment:
      MODEL_PATH: /app/models/crime_prediction.pkl
      PORT: 5000
    volumes:
      - ./models:/app/models
      - ./ml-service:/app
    ports:
      - "${ML_PORT:-5000}:5000"
    networks:
      - saferoute-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # ============================================
  # PROMETHEUS (Monitoring)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: saferoute-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - saferoute-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # GRAFANA (Visualization)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: saferoute-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - saferoute-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============================================
  # PGADMIN (Database Management)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: saferoute-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@saferoute.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password_change_me}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - saferoute-network
    depends_on:
      - postgres

  # ============================================
  # ELASTICSEARCH (Logging)
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: saferoute-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - saferoute-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # KIBANA (Log Visualization)
  # ============================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: saferoute-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - saferoute-network
    depends_on:
      - elasticsearch

  # ============================================
  # FILEBEAT (Log Shipping)
  # ============================================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.10.0
    container_name: saferoute-filebeat
    restart: unless-stopped
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/app
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - saferoute-network
    depends_on:
      - elasticsearch

  # ============================================
  # CADVISOR (Container Monitoring)
  # ============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: saferoute-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - saferoute-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

# ============================================
# NETWORKS
# ============================================
networks:
  saferoute-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
    name: saferoute_postgres_data
  postgres_replica_data:
    driver: local
    name: saferoute_postgres_replica_data
  redis_data:
    driver: local
    name: saferoute_redis_data
  redis_insight_data:
    driver: local
    name: saferoute_redis_insight_data
  prometheus_data:
    driver: local
    name: saferoute_prometheus_data
  grafana_data:
    driver: local
    name: saferoute_grafana_data
  pgadmin_data:
    driver: local
    name: saferoute_pgadmin_data
  elasticsearch_data:
    driver: local
    name: saferoute_elasticsearch_data
  uploads:
    driver: local
    name: saferoute_uploads
  logs:
    driver: local
    name: saferoute_logs

# ============================================
# DOCKER COMPOSE COMMANDS
# ============================================
# Start all services: docker-compose up -d
# Stop all services: docker-compose down
# View logs: docker-compose logs -f
# Scale app: docker-compose up -d --scale app=3
# Rebuild app: docker-compose up -d --build app
# Backup database: docker-compose exec postgres pg_dump -U user saferoute > backup.sql
# Restore database: docker-compose exec -T postgres psql -U user saferoute < backup.sql
# Monitor: docker-compose stats

